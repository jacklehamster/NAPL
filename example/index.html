<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAPL</title>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        display: flex;
        flex-direction: column;
      }
      .frame {
        height: 100%;
        width: 100%;
        border: 0;
      }
      .frame.split {
        width: 50%;
      }
      .tabs {
        display: flex;
        justify-content: center;
        flex: 0 0 auto; /* Tabs take only as much space as they need */
        background-color: lightcyan;
      }
      .container {
        flex: 1 1 auto; /* Content takes the remaining space */
        display: flex;
      }
      .content {
        display: none;
        flex: 1;
        flex-direction: row; /*column;*/
        gap: 2px;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { loadWorkspace } from "../dist/index.js";
      document.addEventListener("DOMContentLoaded", async () => {
        const configJson = await fetch("config.json").then((res) => res.json());
        const searchParams = new URLSearchParams(location.search);

        const initialTab = searchParams.get("tab") ?? configJson.tab;
        const hideTab = searchParams.get("hide-tab") ?? configJson["hide-tab"];
        const room = searchParams.get("room") ?? configJson.room;

        let dispose;

        const tabsContainer = document.querySelector(".tabs");
        const container = document.querySelector(".container");
        const dir = await fetch("dir.json").then((res) => res.json());
        const regex = /(.*)\/config.json/;
        const sites = Object.keys(dir)
          .map((file) => {
            const [, subdir] = file.match(regex) ?? [];
            return subdir;
          })
          .filter((s) => !!s);
        sites.forEach((site, index) => {
          const button = document.createElement("sync-button");
          button.id = `${site}-button`;
          button.textContent = site;
          {
            fetch(`${site}/config.json`)
              .then((res) => res.json())
              .then((siteConfig) => {
                if (siteConfig.name) {
                  button.textContent = siteConfig.name;
                }
              });
          }

          button.addEventListener("click", async () => {
            dispose?.();
            dispose = undefined;
            container.textContent = "";
            if (!document.querySelector(`#${site}-content`)) {
              const div = container.appendChild(document.createElement("div"));
              div.id = `${site}-content`;
              div.classList.add("content");
              const config = await fetch(`${site}/config.json`)
                .then((res) => res.json())
                .catch((e) => console.warn(e));
              if (config?.workspaces) {
                dispose = loadWorkspace(div, config);
              } else {
                const frameRoom = room ?? site;
                const topF = div.appendChild(document.createElement("iframe"));
                topF.classList.add("frame");
                topF.setAttribute("src", `${site}/?room=${frameRoom}`);
                topF.setAttribute("allow", "autoplay");
              }
            }

            const contentDivs = document.querySelectorAll(".content");
            contentDivs.forEach((contentDiv) => {
              contentDiv.style.display = "none";
            });
            const contentDiv = document.getElementById(`${site}-content`);
            contentDiv.style.display = "flex";
          });
          tabsContainer.appendChild(button);
          if (index === 0) {
            button.click();
          }
        });
        if (initialTab) {
          const button = document.querySelector(`#${initialTab}-button`);
          if (button) {
            button.click();
          }
          if (hideTab) {
            tabsContainer.style.display = "none";
          }
        }
      });
    </script>
    <!-- Creating tab -->
    <div class="tabs"></div>
    <div class="container"></div>
  </body>
</html>
